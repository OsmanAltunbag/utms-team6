<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f4f8;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f4f8;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0"
               style="background:#ffffff;border-radius:10px;overflow:hidden;
                      box-shadow:0 4px 16px rgba(0,0,0,0.10);max-width:600px;width:100%;">
          <tr>
            <td style="background-color:#1a3a6b;padding:32px 40px;text-align:center;">
              <p style="margin:0;color:#a0b8d8;font-size:13px;letter-spacing:1px;text-transform:uppercase;">
                İzmir Institute of Technology
              </p>
              <h1 style="margin:8px 0 0;color:#ffffff;font-size:20px;font-weight:700;line-height:1.3;">
                Undergraduate Transfer Management System<br>
                <span style="font-size:14px;font-weight:400;color:#a0b8d8;">(UTMS)</span>
              </h1>
            </td>
          </tr>
          <tr>
            <td style="padding:40px 40px 32px;">
              {{ content | safe }}
            </td>
          </tr>
          <tr>
            <td style="background-color:#f7f9fc;border-top:1px solid #e8ecf0;padding:24px 40px;text-align:center;">
              <p style="margin:0;color:#8a9ab0;font-size:12px;line-height:1.6;">
                Bu e-posta otomatik olarak gönderilmiştir. Lütfen yanıtlamayınız.<br>
                &copy; 2026 UTMS — İzmir Institute of Technology
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
