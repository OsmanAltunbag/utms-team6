<h2 style="margin:0 0 16px;color:#1a3a6b;font-size:22px;">Document Correction Requested</h2>
<p style="margin:0 0 12px;color:#444;font-size:15px;line-height:1.7;">
  {{ correction_note }}
</p>
{% if correction_deadline %}
<p style="margin:0;color:#666;font-size:14px;line-height:1.6;">
  Please re-upload the corrected document(s) by <strong>{{ correction_deadline }}</strong>.
</p>
{% else %}
<p style="margin:0;color:#666;font-size:14px;line-height:1.6;">
  Please re-upload the corrected document(s) within the specified timeframe.
</p>
{% endif %}
